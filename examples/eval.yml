version: 1

cases:
  - id: frontend-mobile-layout
    prompt: "optimize frontend mobile layout"
    mode: permissive
    category: frontend
    expected:
      include: [frontend-ui]
      exclude: [database-migration]
    reason: "Frontend layout work should use the UI skill, not database migration."

  - id: frontend-visual-hierarchy
    prompt: "improve existing page visual hierarchy"
    mode: permissive
    category: frontend
    expected:
      include: [frontend-ui]
      exclude: [security-review]
    reason: "Visual hierarchy is a frontend UI task."

  - id: browser-mobile-rendering
    prompt: "check mobile page rendering in browser"
    mode: permissive
    category: browser
    expected:
      include: [browser-validation]
      optional: [frontend-ui]
      exclude: [database-migration]
    reason: "Browser rendering checks should route to browser validation."

  - id: playwright-screenshot
    prompt: "validate Playwright screenshot flow"
    mode: permissive
    category: browser
    expected:
      include: [browser-validation]
      exclude: [docs-authoring]
    reason: "Playwright and screenshots are browser validation work."

  - id: login-auth-bypass
    prompt: "review login authorization bypass risk"
    mode: permissive
    category: security
    expected:
      include: [security-review]
      exclude: [frontend-ui]
    reason: "Authorization bypass is security review."

  - id: api-access-control
    prompt: "check API access control permissions"
    mode: permissive
    category: security
    expected:
      include: [security-review]
      exclude: [docs-authoring]
    reason: "API permissions belong to security review."

  - id: readme-install
    prompt: "only update README installation instructions"
    mode: permissive
    category: docs
    expected:
      include: [docs-authoring]
      exclude: [deploy-skill]
    reason: "README installation text is documentation work."

  - id: usage-guide
    prompt: "write usage guide documentation"
    mode: permissive
    category: docs
    expected:
      include: [docs-authoring]
      exclude: [security-review]
    reason: "Usage guides are documentation."

  - id: deploy-link
    prompt: "deploy app and give me the release link"
    mode: permissive
    category: deployment
    expected:
      include: [deploy-skill]
      exclude: [database-migration]
    reason: "Deployment link should use deploy skill."

  - id: publish-release-verify
    prompt: "publish release and verify deployment output"
    mode: permissive
    category: deployment
    expected:
      include: [deploy-skill]
      optional: [browser-validation]
      exclude: [image-generation]
    reason: "Publishing a release is deployment work."

  - id: ecommerce-risk
    prompt: "analyze ecommerce product risk using sales metrics"
    mode: permissive
    category: data
    expected:
      include: [data-analysis]
      exclude: [frontend-ui]
    reason: "Metrics and product risk are data analysis."

  - id: market-dataset
    prompt: "compare market trends from dataset"
    mode: permissive
    category: data
    expected:
      include: [data-analysis]
      exclude: [deploy-skill]
    reason: "Market trends from data should route to data analysis."

  - id: product-photo
    prompt: "generate product photo visual assets"
    mode: permissive
    category: image
    expected:
      include: [image-generation]
      exclude: [security-review]
    reason: "Generating photos belongs to image generation."

  - id: illustration-concepts
    prompt: "create illustration concept images"
    mode: permissive
    category: image
    expected:
      include: [image-generation]
      exclude: [database-migration]
    reason: "Illustration concepts are image generation."

  - id: github-pr-comments
    prompt: "review GitHub pull request comments"
    mode: permissive
    category: github
    expected:
      include: [github-review]
      exclude: [image-generation]
    reason: "GitHub PR comments route to GitHub review."

  - id: ci-failure-context
    prompt: "inspect CI failure context in repository"
    mode: permissive
    category: github
    expected:
      include: [github-review]
      exclude: [frontend-ui]
    reason: "CI failure context is repository review work."

  - id: database-schema
    prompt: "change database schema and SQL indexes"
    mode: permissive
    category: database
    expected:
      include: [database-migration]
      exclude: [frontend-ui]
    reason: "Schema and indexes belong to database migration."

  - id: data-model-migration
    prompt: "add migration for data model structure"
    mode: permissive
    category: database
    expected:
      include: [database-migration]
      exclude: [browser-validation]
    reason: "Data model structure changes need database migration."

  - id: refactor-behavior
    prompt: "refactor modules without changing behavior"
    mode: permissive
    category: refactor
    expected:
      include: [code-refactor]
      exclude: [deploy-skill]
    reason: "Refactoring without behavior changes is code refactor."

  - id: reduce-duplication
    prompt: "reduce code duplication and improve maintainability"
    mode: permissive
    category: refactor
    expected:
      include: [code-refactor]
      exclude: [image-generation]
    reason: "Duplication and maintainability are refactor concerns."

  - id: screenshot-mobile-combo
    prompt: "build page from screenshot and check mobile viewport"
    mode: permissive
    category: mixed
    expected:
      include: [frontend-ui, browser-validation]
      exclude: [database-migration]
    reason: "This combines UI implementation and browser viewport validation."

  - id: deploy-browser-combo
    prompt: "deploy app then validate browser rendering"
    mode: permissive
    category: mixed
    expected:
      include: [deploy-skill, browser-validation]
      exclude: [docs-authoring]
    reason: "This combines deployment and browser rendering validation."

  - id: security-docs-combo
    prompt: "review API security and update README notes"
    mode: permissive
    category: mixed
    expected:
      include: [security-review, docs-authoring]
      exclude: [image-generation]
    reason: "This combines security review and documentation."

  - id: data-release-combo
    prompt: "analyze sales data and publish release summary"
    mode: permissive
    category: mixed
    expected:
      include: [data-analysis, deploy-skill]
      exclude: [database-migration]
    reason: "This combines data analysis and release publishing."

  - id: changelog-repo
    prompt: "write changelog for repository changes"
    mode: permissive
    category: docs
    expected:
      include: [docs-authoring]
      optional: [github-review]
      exclude: [image-generation]
    reason: "Changelog writing is documentation."

  - id: image-market-combo
    prompt: "create product image and compare market risk"
    mode: permissive
    category: mixed
    expected:
      include: [image-generation, data-analysis]
      exclude: [database-migration]
    reason: "This combines image generation and data analysis."

  - id: zh-frontend-mobile
    prompt: "优化现有网页布局并检查移动端显示"
    mode: permissive
    category: frontend
    expected:
      include: [frontend-ui]
      optional: [browser-validation]
      exclude: [database-migration]
    reason: "中文网页和移动端任务应命中前端 UI。"

  - id: zh-security-login
    prompt: "检查登录接口是否存在权限绕过"
    mode: permissive
    category: security
    expected:
      include: [security-review]
      exclude: [image-generation]
    reason: "中文登录权限绕过任务应命中安全审查。"

  - id: zh-readme-install
    prompt: "只修改 README 中的安装说明"
    mode: permissive
    category: docs
    expected:
      include: [docs-authoring]
      exclude: [database-migration]
    reason: "中文 README 安装说明属于文档任务。"

  - id: zh-database-schema
    prompt: "修改数据库结构和索引"
    mode: permissive
    category: database
    expected:
      include: [database-migration]
      exclude: [frontend-ui]
    reason: "中文数据库结构任务应命中数据库迁移。"

  - id: zh-data-risk
    prompt: "分析亚马逊选品风险和销售数据"
    mode: permissive
    category: data
    expected:
      include: [data-analysis]
      exclude: [deploy-skill]
    reason: "中文选品风险和销售数据属于数据分析。"

  - id: zh-image
    prompt: "生成产品图片和视觉素材"
    mode: permissive
    category: image
    expected:
      include: [image-generation]
      exclude: [security-review]
    reason: "中文图片生成任务应命中 image-generation。"

  - id: zh-refactor
    prompt: "重构代码但不改变行为"
    mode: permissive
    category: refactor
    expected:
      include: [code-refactor]
      exclude: [deploy-skill]
    reason: "中文重构任务应命中 code-refactor。"

  - id: zh-deploy
    prompt: "发布应用并给我部署链接"
    mode: permissive
    category: deployment
    expected:
      include: [deploy-skill]
      exclude: [image-generation]
    reason: "中文发布和部署链接任务应命中 deploy-skill。"

  - id: mixed-github-docs
    prompt: "review GitHub issues and write documentation summary"
    mode: permissive
    category: mixed
    expected:
      include: [github-review, docs-authoring]
      exclude: [database-migration]
    reason: "This combines GitHub review and documentation."

  - id: mixed-security-browser
    prompt: "check login security and validate browser rendering"
    mode: permissive
    category: mixed
    expected:
      include: [security-review, browser-validation]
      exclude: [image-generation]
    reason: "This combines security and browser validation."

  - id: mixed-db-docs
    prompt: "change database schema and update migration docs"
    mode: permissive
    category: mixed
    expected:
      include: [database-migration, docs-authoring]
      exclude: [image-generation]
    reason: "This combines database migration and documentation."

  - id: mixed-refactor-github
    prompt: "refactor repository code and address pull request comments"
    mode: permissive
    category: mixed
    expected:
      include: [code-refactor, github-review]
      exclude: [image-generation]
    reason: "This combines code refactor and PR comment handling."

  - id: mixed-image-docs
    prompt: "generate product image and write usage guide"
    mode: permissive
    category: mixed
    expected:
      include: [image-generation, docs-authoring]
      exclude: [database-migration]
    reason: "This combines image generation and documentation."

  - id: mixed-browser-docs
    prompt: "validate browser screenshot flow and write documentation notes"
    mode: permissive
    category: mixed
    expected:
      include: [browser-validation, docs-authoring]
      exclude: [database-migration]
    reason: "This combines browser validation and documentation."

  - id: no-match-variable-rename
    prompt: "rename variable resultData to result"
    mode: strict
    category: no-match
    expected:
      include: []
      optional: []
      exclude: []
